ass="line">121</span><br><span class="line">122</span><br><span class="line">123</span><br><span class="line">124</span><br><span class="line">125</span><br><span class="line">126</span><br><span class="line">127</span><br><span class="line">128</span><br><span class="line">129</span><br><span class="line">130</span><br><span class="line">131</span><br><span class="line">132</span><br><span class="line">133</span><br><span class="line">134</span><br><span class="line">135</span><br><span class="line">136</span><br><span class="line">137</span><br><span class="line">138</span><br><span class="line">139</span><br><span class="line">140</span><br><span class="line">141</span><br><span class="line">142</span><br><span class="line">143</span><br><span class="line">144</span><br><span class="line">145</span><br><span class="line">146</span><br></pre></td><td class="code"><pre><span class="line"></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;cstdio&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;cstring&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;iostream&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;map&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;vector&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;string&gt;</span> </span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;unordered_map&gt;</span> </span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;list&gt;</span> </span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;queue&gt;</span> </span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;functional&gt;</span></span></span><br><span class="line"><span class="meta">#<span class="keyword">include</span> <span class="string">&lt;memory&gt;</span> </span></span><br><span class="line"><span class="keyword">using</span> <span class="keyword">namespace</span> std;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">MyGreater</span>;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>, <span class="keyword">class</span> <span class="title class_">CMP</span>&gt;</span><br><span class="line"><span class="keyword">class</span>  <span class="title class_">PriorityHeap</span> &#123;</span><br><span class="line"></span><br><span class="line"><span class="keyword">private</span>:</span><br><span class="line">	T *data;</span><br><span class="line">	<span class="type">int</span> idx;</span><br><span class="line">	<span class="type">int</span> maxIdx;</span><br><span class="line">	CMP cmp;</span><br><span class="line"></span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">	<span class="built_in">PriorityHeap</span>(<span class="type">int</span> m ) &#123;</span><br><span class="line">		idx = <span class="number">0</span>;</span><br><span class="line">		maxIdx = m;</span><br><span class="line">		data = <span class="keyword">new</span> <span class="type">int</span>[m+<span class="number">1</span>];</span><br><span class="line">		<span class="built_in">memset</span>(data, <span class="number">0</span>, <span class="built_in">sizeof</span>(T)*(m + <span class="number">1</span>));</span><br><span class="line">	&#125;</span><br><span class="line">	~<span class="built_in">PriorityHeap</span>() &#123;</span><br><span class="line">		<span class="keyword">delete</span>[] data;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="comment">// 下沉</span></span><br><span class="line">	<span class="function"><span class="type">void</span> <span class="title">downTo</span><span class="params">(T k)</span> </span>&#123; </span><br><span class="line">		<span class="comment">// 1 将该值存起来</span></span><br><span class="line">		T  tmp = data[k];</span><br><span class="line">		<span class="keyword">while</span> ( <span class="number">1</span> ) &#123; </span><br><span class="line">			<span class="comment">// 2 寻找 最适合的儿子</span></span><br><span class="line">			<span class="type">int</span> l = <span class="number">2</span> * k;</span><br><span class="line">			<span class="keyword">if</span> (l &gt; idx) <span class="keyword">break</span>; <span class="comment">// 如果没有儿子退出</span></span><br><span class="line">			<span class="keyword">if</span> (l + <span class="number">1</span> &lt;= idx &amp;&amp; <span class="built_in">cmp</span>(data[l], data[l + <span class="number">1</span>])  ) &#123;</span><br><span class="line">				++l;</span><br><span class="line">			&#125; </span><br><span class="line">			<span class="comment">// 3 如果儿子符合，将其上升，否则退出</span></span><br><span class="line">			<span class="keyword">if</span> ( <span class="built_in">cmp</span>( tmp, data[l] )  ) &#123;</span><br><span class="line">				data[k] = data[l];</span><br><span class="line">				k = l;</span><br><span class="line">			&#125; <span class="keyword">else</span> &#123;</span><br><span class="line">				<span class="keyword">break</span>;</span><br><span class="line">			&#125;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">// 4 在该空位放置tmp</span></span><br><span class="line">		data[k] = tmp;</span><br><span class="line">	&#125; </span><br><span class="line">	<span class="function"><span class="type">bool</span> <span class="title">put</span><span class="params">(T  val)</span> </span>&#123;</span><br><span class="line">		<span class="keyword">if</span> (idx == maxIdx) <span class="keyword">return</span> <span class="literal">false</span>;</span><br><span class="line">		data[++idx] = val; </span><br><span class="line">		<span class="comment">// 上浮</span></span><br><span class="line">		<span class="type">int</span> prev = idx;</span><br><span class="line">		<span class="type">int</span> father = idx / <span class="number">2</span>;</span><br><span class="line">		<span class="comment">// 不断把father下移，给val移出位置</span></span><br><span class="line">		<span class="keyword">while</span> ( <span class="built_in">cmp</span>(data[father], data[prev] ) &amp;&amp; father &gt;= <span class="number">1</span>) &#123;</span><br><span class="line">			data[prev] = data[father];</span><br><span class="line">			prev = father;</span><br><span class="line">			father = father / <span class="number">2</span>;</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="comment">// 在prev位置上放val</span></span><br><span class="line">		data[prev] = val;  </span><br><span class="line"></span><br><span class="line">		<span class="keyword">return</span> <span class="literal">true</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function">T  <span class="title">top</span><span class="params">()</span> <span class="type">const</span> </span>&#123;</span><br><span class="line">		<span class="keyword">if</span> (idx != <span class="number">0</span>) &#123;</span><br><span class="line">			<span class="keyword">return</span> data[<span class="number">1</span>];</span><br><span class="line">		&#125;</span><br><span class="line">		<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="type">void</span> <span class="title">pop</span><span class="params">()</span> </span>&#123;</span><br><span class="line">		<span class="keyword">if</span> (idx != <span class="number">0</span>) &#123;</span><br><span class="line">			--idx;</span><br><span class="line">		&#125; </span><br><span class="line">		data[<span class="number">1</span>] = data[idx + <span class="number">1</span>];</span><br><span class="line">		data[idx + <span class="number">1</span>] = <span class="number">0</span>;</span><br><span class="line">		<span class="built_in">downTo</span>(<span class="number">1</span>); </span><br><span class="line">	&#125;</span><br><span class="line">	<span class="function"><span class="type">bool</span> <span class="title">empty</span><span class="params">()</span> </span>&#123;</span><br><span class="line">		<span class="keyword">return</span> idx == <span class="number">0</span>;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">MyGreater</span> </span><br><span class="line">&#123;</span><br><span class="line"> <span class="keyword">public</span>:</span><br><span class="line">	<span class="function"><span class="type">bool</span> <span class="title">operator</span><span class="params">()</span><span class="params">(<span class="type">const</span> T&amp; x, <span class="type">const</span> T&amp; y)</span> <span class="type">const</span></span></span><br><span class="line"><span class="function">	</span>&#123;</span><br><span class="line">		<span class="keyword">return</span> x &gt; y;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"><span class="keyword">template</span>&lt;<span class="keyword">class</span> <span class="title class_">T</span>&gt;</span><br><span class="line"><span class="keyword">class</span> <span class="title class_">MyLess</span></span><br><span class="line">&#123;</span><br><span class="line"><span class="keyword">public</span>:</span><br><span class="line">	<span class="function"><span class="type">bool</span> <span class="title">operator</span><span class="params">()</span><span class="params">(<span class="type">const</span> T&amp; x, <span class="type">const</span> T&amp; y)</span> <span class="type">const</span></span></span><br><span class="line"><span class="function">	</span>&#123;</span><br><span class="line">		<span class="keyword">return</span> x &lt; y;</span><br><span class="line">	&#125;</span><br><span class="line">&#125;;</span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"></span><br><span class="line"><span class="function"><span class="type">int</span> <span class="title">main</span><span class="params">()</span> </span>&#123;   </span><br><span class="line"></span><br><span class="line">	PriorityHeap&lt;<span class="type">int</span>, MyGreater&lt;<span class="type">int</span>&gt;&gt; <span class="built_in">h</span>(<span class="number">100</span>);</span><br><span class="line">	h.<span class="built_in">put</span>(<span class="number">3</span>);</span><br><span class="line">	h.<span class="built_in">put</span>(<span class="number">4</span>);</span><br><span class="line">	h.<span class="built_in">put</span>(<span class="number">1</span>);</span><br><span class="line">	h.<span class="built_in">put</span>(<span class="number">2</span>);</span><br><span class="line"></span><br><span class="line">	<span class="keyword">while</span> (!h.<span class="built_in">empty</span>()) &#123;</span><br><span class="line">		cout &lt;&lt; h.<span class="built_in">top</span>() &lt;&lt; endl;</span><br><span class="line">		h.<span class="built_in">pop</span>();</span><br><span class="line"></span><br><span class="line">	&#125;</span><br><span class="line">	</span><br><span class="line">	<span class="keyword">return</span> <span class="number">0</span>;</span><br><span class="line">&#125;</span><br><span class="line"></span><br><span class="line"><span class="comment">/*</span></span><br><span class="line"><span class="comment">结果：MyGreater表示小根堆：</span></span><br><span class="line"><span class="comment">1</span></span><br><span class="line"><span class="comment">2</span></span><br><span class="line"><span class="comment">3</span></span><br><span class="line"><span class="comment">4</span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment"></span></span><br><span class="line"><span class="comment">*/</span></span><br></pre></td></tr></table></figure></div></div><div class="post-main post-comment"></div></article><link rel="stylesheet" type="text/css" href="//cdn.bootcdn.net/ajax/libs/font-awesome/4.5.0/css/font-awesome.min.css"><link rel="stylesheet" type="text/css" href="//cdn.bootcdn.net/ajax/libs/lato-font/3.0.0/css/lato-font.min.css"><link rel="stylesheet" type="text/css" href="//cdn.bootcdn.net/ajax/libs/fancybox/2.1.5/jquery.fancybox.css"><script src="//cdn.bootcdn.net/ajax/libs/jquery/2.0.3/jquery.min.js"></script><script src="//cdn.bootcdn.net/ajax/libs/fancybox/2.1.5/jquery.fancybox.pack.js"></script><script>$(document).ready(function() {
